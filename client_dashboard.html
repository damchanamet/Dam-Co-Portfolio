<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Portfolio by Dam</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<style>
:root{
  --bg:#090b14;--card:#13151f;--card2:#191c2b;--card3:#1f2233;
  --border:rgba(255,255,255,0.07);--text:#eef0ff;--muted:#8891b8;--sub:#4f566b;
  --green:#10b981;--red:#ef4444;--accent:#6366f1;--accent-color:#6366f1;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* Screens */
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}

/* ── LOGIN ── */
.c{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:calc(var(--safe-top)+48px) 28px calc(var(--safe-bottom)+40px)}
.logo{font-size:44px;margin-bottom:12px}
.app-title{font-size:24px;font-weight:900;letter-spacing:-.5px;margin-bottom:4px}
.app-sub{font-size:13px;color:var(--muted);margin-bottom:52px}
.profiles{display:flex;flex-direction:column;gap:13px;width:100%;max-width:340px}
.profile-btn{background:var(--card);border:1.5px solid var(--border);border-radius:18px;padding:16px 18px;display:flex;align-items:center;gap:15px;cursor:pointer;transition:all .2s}
.profile-btn:active{transform:scale(.97);background:var(--card2)}
.p-avatar{width:52px;height:52px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.p-name{font-size:17px;font-weight:800;margin-bottom:2px}
.p-desc{font-size:12px;color:var(--muted)}
.p-arrow{margin-left:auto;color:var(--sub);font-size:22px;font-weight:300}

/* ── PIN ── */
.pin-wrap{flex:1;display:flex;flex-direction:column;align-items:center;padding:calc(var(--safe-top)+16px) 24px calc(var(--safe-bottom)+16px)}
.back-btn{align-self:flex-start;background:transparent;border:none;color:var(--muted);font-size:14px;padding:8px 0 28px;cursor:pointer;display:flex;align-items:center;gap:5px}
.pin-avatar{width:72px;height:72px;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:14px}
.pin-name{font-size:26px;font-weight:900;margin-bottom:6px}
.pin-hint{font-size:13px;color:var(--muted);margin-bottom:36px}
.pin-dots{display:flex;gap:14px;margin-bottom:44px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--sub);background:transparent;transition:all .15s}
.pin-dot.filled{background:var(--accent-color);border-color:var(--accent-color);transform:scale(1.15)}
.pin-dot.error{border-color:var(--red)!important;background:var(--red)!important;animation:shake .35s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:300px}
.num-btn{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:19px;font-size:22px;font-weight:600;cursor:pointer;transition:all .1s;color:var(--text);display:flex;align-items:center;justify-content:center}
.num-btn:active{background:var(--card3);transform:scale(.92)}
.num-del{font-size:16px;color:var(--muted)}
.num-empty{background:transparent;border-color:transparent;pointer-events:none}

/* ── SYNC CODE SCREEN ── */
.sync-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:calc(var(--safe-top)+24px) 28px calc(var(--safe-bottom)+32px)}
.sync-icon{font-size:48px;margin-bottom:16px}
.sync-title{font-size:22px;font-weight:900;margin-bottom:8px;text-align:center}
.sync-sub{font-size:13px;color:var(--muted);text-align:center;line-height:1.6;margin-bottom:32px;max-width:300px}
.sync-input{width:100%;max-width:360px;background:var(--card);border:1.5px solid var(--border);border-radius:14px;padding:14px 16px;color:var(--text);font-size:14px;outline:none;margin-bottom:8px;transition:.2s}
.sync-input:focus{border-color:var(--accent)}
.sync-hint{font-size:11px;color:var(--sub);text-align:center;margin-bottom:24px;max-width:300px;line-height:1.5}
.btn-primary{background:var(--accent-color);border:none;color:#fff;border-radius:14px;padding:16px;font-size:15px;font-weight:700;cursor:pointer;width:100%;max-width:360px;transition:.15s}
.btn-primary:active{opacity:.8}
.sync-err{font-size:12px;color:var(--red);text-align:center;margin-top:8px;min-height:18px}

/* ── DASHBOARD ── */
.dash-header{padding:calc(var(--safe-top)+14px) 16px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;background:rgba(9,11,20,.93);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.d-avatar{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px}
.d-name{font-size:16px;font-weight:800;margin-left:9px}
.btn-out{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:6px 13px;font-size:12px;cursor:pointer}
.dash-body{padding:20px 16px calc(48px + var(--safe-bottom))}

/* Hero */
.hero-wrap{display:flex;justify-content:center;margin-bottom:8px}
.hero{border-radius:24px;padding:28px 36px;text-align:center;position:relative;overflow:hidden;min-width:260px}
.hero-glow{position:absolute;top:-50px;left:50%;transform:translateX(-50%);width:200px;height:200px;border-radius:50%;opacity:.1;pointer-events:none}
.hero-lbl{font-size:11px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:8px}
.hero-val{font-size:42px;font-weight:900;letter-spacing:-2px;line-height:1;margin-bottom:6px}
.hero-usd{font-size:14px;color:rgba(255,255,255,.4)}

/* FX pill */
.fx-pill{display:flex;justify-content:center;margin-bottom:22px}
.fx-tag{display:inline-flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:5px 13px;font-size:12px;color:var(--muted)}
.fx-tag b{color:var(--text);font-weight:700}
.fx-src{font-size:10px;opacity:.5}

/* Section */
.sec{margin-bottom:26px}
.sec-hdr{font-size:10px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-left:2px}

/* Holdings table */
.h-tbl{width:100%;border-collapse:collapse}
.h-tbl th{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--sub);padding:0 10px 10px;text-align:right}
.h-tbl th:first-child{text-align:left}
.h-tbl td{padding:10px;border-top:1px solid var(--border);font-size:13px;text-align:right;vertical-align:middle}
.h-tbl td:first-child{text-align:left}
.h-tbl tr:last-child td{border-bottom:1px solid var(--border)}
.h-sym{font-size:14px;font-weight:800}
.h-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:8px;vertical-align:middle}

/* Pie */
.pie-wrap{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:20px;margin-bottom:24px}
.pie-title{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:16px}
.pie-canvas-wrap{max-width:320px;margin:0 auto}

/* Struct */
.s-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px 15px;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between}
.s-title{font-size:14px;font-weight:700}
.s-sub{font-size:11px;color:var(--muted);margin-top:2px}
.s-tag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:7px;display:inline-block}

/* Footer */
.dash-foot{text-align:center;padding:12px 0 4px;font-size:11px;color:var(--sub)}

/* Loading */
.loading{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted);font-size:14px;padding:40px;text-align:center}
.spin{animation:spin .8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- ══ SCREEN 1: LOGIN ══ -->
<div class="screen active" id="screenLogin">
  <div class="c">
    <div class="logo">📊</div>
    <div class="app-title">Portfolio</div>
    <div class="app-sub">by Dam · เลือกบัญชีของคุณ</div>
    <div class="profiles" id="profileList"></div>
  </div>
</div>

<!-- ══ SCREEN 2: PIN (6 หลัก) ══ -->
<div class="screen" id="screenPin">
  <div class="pin-wrap">
    <button class="back-btn" onclick="showLogin()">← กลับ</button>
    <div class="pin-avatar" id="pinAvatar"></div>
    <div class="pin-name" id="pinName"></div>
    <div class="pin-hint">ใส่รหัส PIN 6 หลัก</div>
    <div class="pin-dots" id="pinDots"></div>
    <div class="numpad">
      <button class="num-btn" onclick="numTap('1')">1</button>
      <button class="num-btn" onclick="numTap('2')">2</button>
      <button class="num-btn" onclick="numTap('3')">3</button>
      <button class="num-btn" onclick="numTap('4')">4</button>
      <button class="num-btn" onclick="numTap('5')">5</button>
      <button class="num-btn" onclick="numTap('6')">6</button>
      <button class="num-btn" onclick="numTap('7')">7</button>
      <button class="num-btn" onclick="numTap('8')">8</button>
      <button class="num-btn" onclick="numTap('9')">9</button>
      <button class="num-btn num-empty"></button>
      <button class="num-btn" onclick="numTap('0')">0</button>
      <button class="num-btn num-del" onclick="numDel()">⌫</button>
    </div>
  </div>
</div>

<!-- ══ SCREEN 3: SYNC CODE (เครื่องใหม่ครั้งแรก) ══ -->
<div class="screen" id="screenSync">
  <div class="sync-wrap">
    <div class="sync-icon">🔗</div>
    <div class="sync-title">เชื่อมต่อข้อมูล</div>
    <div class="sync-sub">เครื่องนี้ยังไม่เคยเชื่อมต่อ<br>ขอ Sync Code จาก Dam แล้ววางด้านล่าง</div>
    <input class="sync-input" id="syncInput" type="text" placeholder="วาง Sync Code ที่นี่…" autocomplete="off" autocorrect="off" spellcheck="false">
    <div class="sync-hint">Dam จะให้ Sync Code ผ่าน Line/WhatsApp<br>ไม่ต้องกรอกซ้ำในครั้งถัดไป</div>
    <button class="btn-primary" onclick="submitSync()">✓ เชื่อมต่อ</button>
    <div class="sync-err" id="syncErr"></div>
  </div>
</div>

<!-- ══ SCREEN 4: DASHBOARD ══ -->
<div class="screen" id="screenDash">
  <div class="dash-header">
    <div style="display:flex;align-items:center">
      <div class="d-avatar" id="dashAvatar"></div>
      <div class="d-name" id="dashName"></div>
    </div>
    <button class="btn-out" onclick="showLogin()">ออก</button>
  </div>
  <div class="dash-body" id="dashBody">
    <div class="loading"><span class="spin" style="font-size:24px">↻</span>กำลังโหลด…</div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════
//  PROFILES
//  ⚙️ Dam: แก้ pin ตรงนี้ แล้ว upload ไฟล์ใหม่ขึ้น GitHub
// ════════════════════════════════════════════════════════
const PROFILES = [
  { id:'dew',  name:'Dew',  emoji:'🌿', color:'#10b981', bg:'rgba(16,185,129,0.15)', portKey:'dew',  pin:'366154' },
  { id:'dike', name:'Dike', emoji:'🏦', color:'#3b82f6', bg:'rgba(59,130,246,0.15)', portKey:'dike', pin:'147359' },
  { id:'big',  name:'Big',  emoji:'💼', color:'#f59e0b', bg:'rgba(245,158,11,0.15)', portKey:'big',  pin:'123456' },
];
const PIN_LEN = 6;

// ════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════
let me     = null;
let pinBuf = '';
let pieChart = null;

// ════════════════════════════════════════════════════════
//  STORAGE
// ════════════════════════════════════════════════════════
const ls = {
  get:    (k,d='') => { try{return localStorage.getItem(k)||d}catch{return d} },
  set:    (k,v)    => { try{localStorage.setItem(k,v)}catch{} },
};
const getSyncCode = () => ls.get('cl_sync');

function parseSyncCode(code) {
  try {
    const dec = decodeURIComponent(escape(atob(code.trim())));
    const i   = dec.indexOf('|||');
    if (i < 0) return null;
    return { key: dec.slice(0,i), id: dec.slice(i+3) };
  } catch { return null; }
}

// ════════════════════════════════════════════════════════
//  SCREEN NAVIGATION
// ════════════════════════════════════════════════════════
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showLogin() { me=null; pinBuf=''; show('screenLogin'); }

// ════════════════════════════════════════════════════════
//  PROFILE LIST
// ════════════════════════════════════════════════════════
function renderProfileList() {
  document.getElementById('profileList').innerHTML = PROFILES.map(p => `
    <div class="profile-btn" onclick="selectProfile('${p.id}')" style="border-color:${p.color}33">
      <div class="p-avatar" style="background:${p.bg}">${p.emoji}</div>
      <div>
        <div class="p-name" style="color:${p.color}">${p.name}</div>
        <div class="p-desc">ดูพอร์ตของฉัน</div>
      </div>
      <div class="p-arrow">›</div>
    </div>
  `).join('');
}

// ════════════════════════════════════════════════════════
//  SELECT PROFILE → PIN SCREEN
// ════════════════════════════════════════════════════════
function selectProfile(id) {
  me = PROFILES.find(p => p.id === id);
  if (!me) return;
  pinBuf = '';
  document.documentElement.style.setProperty('--accent-color', me.color);
  // render dots
  document.getElementById('pinDots').innerHTML =
    Array.from({length: PIN_LEN}, (_,i) => `<div class="pin-dot" id="pd${i}"></div>`).join('');
  const av = document.getElementById('pinAvatar');
  av.textContent = me.emoji; av.style.background = me.bg;
  document.getElementById('pinName').textContent = me.name;
  document.getElementById('pinName').style.color  = me.color;
  show('screenPin');
}

// ════════════════════════════════════════════════════════
//  PIN LOGIC
// ════════════════════════════════════════════════════════
function numTap(d) {
  if (pinBuf.length >= PIN_LEN) return;
  pinBuf += d; updateDots();
  if (pinBuf.length === PIN_LEN) setTimeout(checkPin, 130);
}
function numDel() { pinBuf = pinBuf.slice(0,-1); updateDots(); }
function updateDots() {
  for (let i=0; i<PIN_LEN; i++) {
    const el = document.getElementById('pd'+i);
    if (!el) continue;
    el.classList.toggle('filled', i < pinBuf.length);
    el.classList.remove('error');
  }
}
function checkPin() {
  if (pinBuf === me.pin) {
    pinCorrect();
  } else {
    for (let i=0; i<PIN_LEN; i++) document.getElementById('pd'+i)?.classList.add('error');
    setTimeout(() => { pinBuf=''; updateDots(); }, 650);
  }
}
function pinCorrect() {
  // ถ้ามี sync code แล้ว → เข้า dashboard เลย
  // ถ้ายังไม่มี → ให้ใส่ sync code
  if (getSyncCode()) {
    openDashboard();
  } else {
    document.getElementById('syncInput').value = '';
    document.getElementById('syncErr').textContent = '';
    show('screenSync');
  }
}

// ════════════════════════════════════════════════════════
//  SYNC CODE SCREEN
// ════════════════════════════════════════════════════════
function submitSync() {
  const code = document.getElementById('syncInput').value.trim();
  const errEl = document.getElementById('syncErr');
  if (!code) { errEl.textContent = 'กรุณาวาง Sync Code'; return; }
  if (!parseSyncCode(code)) { errEl.textContent = 'Sync Code ไม่ถูกต้อง ลองใหม่นะครับ'; return; }
  ls.set('cl_sync', code);
  errEl.textContent = '';
  openDashboard();
}

// ════════════════════════════════════════════════════════
//  DASHBOARD
// ════════════════════════════════════════════════════════
function openDashboard() {
  const av = document.getElementById('dashAvatar');
  av.textContent = me.emoji; av.style.background = me.bg;
  document.getElementById('dashName').textContent = me.name;
  document.getElementById('dashName').style.color  = me.color;
  document.getElementById('dashBody').innerHTML =
    '<div class="loading"><span class="spin" style="font-size:24px">↻</span>กำลังโหลดข้อมูล…</div>';
  show('screenDash');
  loadData();
}

async function fetchLiveFX() {
  try {
    const r = await fetch('https://open.er-api.com/v6/latest/USD',{signal:AbortSignal.timeout(5000)});
    if (r.ok) { const d=await r.json(); if(d.result==='success'&&d.rates?.THB) return d.rates.THB; }
  } catch {}
  return null;
}

async function loadData() {
  const code = getSyncCode();
  const cfg  = parseSyncCode(code||'');
  if (!cfg) {
    document.getElementById('dashBody').innerHTML =
      '<div class="loading">❌ Sync Code ไม่ถูกต้อง<br><span style="font-size:12px;margin-top:8px;display:block">กด "ออก" แล้วลองใหม่</span></div>';
    return;
  }
  try {
    const [dataRes, liveFX] = await Promise.all([
      fetch(`https://api.jsonbin.io/v3/b/${cfg.id}/latest`,{headers:{'X-Master-Key':cfg.key,'X-Bin-Meta':'false'}}),
      fetchLiveFX()
    ]);
    if (!dataRes.ok) throw new Error('HTTP '+dataRes.status);
    const S = await dataRes.json();
    if (liveFX) S._liveFX = liveFX;
    renderDash(S);
  } catch(e) {
    document.getElementById('dashBody').innerHTML =
      '<div class="loading">❌ โหลดข้อมูลไม่ได้<br><span style="font-size:12px;color:var(--sub);margin-top:8px;display:block">ตรวจสอบ Internet</span></div>';
  }
}

// ════════════════════════════════════════════════════════
//  RENDER DASHBOARD
// ════════════════════════════════════════════════════════
const COLORS = ['#7c3aed','#3b82f6','#10b981','#f59e0b','#ef4444','#0ea5e9','#8b5cf6','#ea580c','#06b6d4','#84cc16','#ec4899','#14b8a6'];

function renderDash(S) {
  if (!S?.portfolios) { document.getElementById('dashBody').innerHTML='<div class="loading">ข้อมูลไม่ถูกต้อง</div>'; return; }

  const port = S.portfolios.find(p =>
    (p.extKey||'').toLowerCase()===me.portKey ||
    (p.name||'').toLowerCase().includes(me.portKey)
  );
  if (!port) {
    document.getElementById('dashBody').innerHTML=`<div class="loading">ไม่พบพอร์ตของ ${me.name}</div>`;
    return;
  }

  const all     = (S.holdings||[]).filter(h=>h.portfolioId===port.id);
  const stocks  = all.filter(h=>!['option','accumulator','decumulator','fcn','cash','money_market','other'].includes(h.type));
  const cash    = all.filter(h=>h.type==='cash'||h.type==='money_market');
  const accdec  = all.filter(h=>h.type==='accumulator'||h.type==='decumulator');
  const options = all.filter(h=>h.type==='option');

  const fxUSD = parseFloat(S._liveFX)||parseFloat(S.lastFxRates?.USD)||parseFloat(S.fxRates?.USD)||35;
  const fxSrc = S._liveFX?'live':(S.lastFxRates?.USD?'cached':'fallback');
  const toUSD = (v,cur) => { if(!v)return 0; cur=(cur&&cur!=='AUTO')?cur:'USD'; if(cur==='USD')return v; return v/fxUSD; };

  let totalUSD=0;
  const stockData = stocks.map(h => {
    const cur  =(h.currency&&h.currency!=='AUTO')?h.currency:'USD';
    const price=parseFloat(h.currentPrice||h.price)||0;
    const qty  =parseFloat(h.qty)||0;
    const val  =toUSD(price*qty,cur);
    totalUSD  +=val;
    return {h,price,qty,val,sym:h.resolvedSymbol||h.symbol||'?'};
  });
  cash.forEach(h=>{const cur=(h.currency&&h.currency!=='AUTO')?h.currency:'USD';totalUSD+=toUSD(parseFloat(h.currentPrice||h.price)||0,cur);});
  stockData.sort((a,b)=>b.val-a.val);

  const f2=n=>n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  const f0=n=>Math.round(n).toLocaleString('en-US');
  const fUSD=n=>'$'+f2(n);

  let html='';

  // Hero
  html+=`
    <div class="hero-wrap">
      <div class="hero" style="border:1.5px solid ${me.color}44;background:linear-gradient(145deg,${me.bg} 0%,var(--card2) 100%)">
        <div class="hero-glow" style="background:${me.color}"></div>
        <div class="hero-lbl">Portfolio Value</div>
        <div class="hero-val" style="color:${me.color}">฿${f0(totalUSD*fxUSD)}</div>
        <div class="hero-usd">${fUSD(totalUSD)}</div>
      </div>
    </div>
    <div class="fx-pill">
      <div class="fx-tag"><span style="font-size:10px;opacity:.5">FX</span> <b>$1 = ฿${fxUSD.toFixed(2)}</b> <span class="fx-src">${fxSrc}</span></div>
    </div>`;

  // Holdings table
  if (stockData.length) {
    html+=`<div class="sec"><div class="sec-hdr">💼 หุ้น</div>
      <table class="h-tbl"><thead><tr>
        <th>Symbol</th><th>จำนวน</th><th>ราคา</th><th>มูลค่า</th>
      </tr></thead><tbody>`;
    stockData.forEach(({price,qty,val,sym},i)=>{
      const col=COLORS[i%COLORS.length];
      html+=`<tr>
        <td><span class="h-dot" style="background:${col}"></span><span class="h-sym" style="color:${col}">${sym}</span></td>
        <td style="color:var(--muted)">${qty.toLocaleString('en',{maximumFractionDigits:3})}</td>
        <td style="color:var(--muted)">$${f2(price)}</td>
        <td style="font-weight:700">${fUSD(val)}</td>
      </tr>`;
    });
    html+=`</tbody></table></div>`;
  }

  // Cash
  if (cash.length) {
    html+=`<div class="sec"><div class="sec-hdr">💵 เงินสด</div>`;
    cash.forEach(h=>{
      const cur=(h.currency&&h.currency!=='AUTO')?h.currency:'USD';
      const val=parseFloat(h.currentPrice||h.price)||0;
      const disp=cur==='USD'?fUSD(val):`฿${f0(val)}`;
      html+=`<div class="s-card"><div><div class="s-title">เงินสด (${cur})</div></div><div style="font-size:15px;font-weight:800">${disp}</div></div>`;
    });
    html+=`</div>`;
  }

  // Pie
  if (stockData.length>1) {
    html+=`<div class="pie-wrap"><div class="pie-title">Allocation</div><div class="pie-canvas-wrap"><canvas id="pieCanvas"></canvas></div></div>`;
  }

  // Acc/Dec
  if (accdec.length) {
    html+=`<div class="sec"><div class="sec-hdr">🔄 Accumulator / Decumulator</div>`;
    accdec.forEach(h=>{
      const isAcc=h.type==='accumulator';
      const col=isAcc?'#10b981':'#f59e0b';
      const tag=isAcc?'ACC':'DEC';
      const sym=h.optionUnderlying||(h.symbol||'').split(' ')[0]||'?';
      const strike=parseFloat(h.strike)||0;
      const ko=parseFloat(h.koLevel)||0;
      const qty=parseFloat(h.periodQty)||0;
      html+=`<div class="s-card"><div>
        <div class="s-title">${sym} <span class="s-tag" style="background:${col}20;color:${col}">${tag}</span></div>
        <div class="s-sub">${qty.toLocaleString()}/วัน · Strike $${f2(strike)}${ko?` · KO $${f2(ko)}`:''}${h.expiry?` · หมด ${h.expiry}`:''}</div>
      </div><div class="s-tag" style="background:rgba(16,185,129,.1);color:var(--green)">Active</div></div>`;
    });
    html+=`</div>`;
  }

  // Options
  if (options.length) {
    html+=`<div class="sec"><div class="sec-hdr">📋 Options</div>`;
    options.forEach(h=>{
      const isSell=(h.side||'sell')==='sell';
      const col=isSell?'#ef4444':'#10b981';
      const tag=(isSell?'SELL ':'BUY ')+(h.optionType||'').toUpperCase();
      const sym=h.optionUnderlying||h.symbol||'?';
      html+=`<div class="s-card"><div>
        <div class="s-title">${sym} <span class="s-tag" style="background:${col}20;color:${col}">${tag}</span></div>
        <div class="s-sub">Strike $${f2(parseFloat(h.strike)||0)} · หมด ${h.expiry||'—'} · ${h.contracts||1} contracts</div>
      </div></div>`;
    });
    html+=`</div>`;
  }

  if (!stockData.length&&!cash.length)
    html+=`<div class="loading" style="padding-top:60px">📭 ยังไม่มีข้อมูลในพอร์ต</div>`;

  html+=`<div class="dash-foot">ข้อมูลจาก Portfolio Dashboard · อัปเดตเมื่อ Dam กดรีเฟรชราคา</div>`;
  document.getElementById('dashBody').innerHTML = html;

  // Pie chart
  if (stockData.length>1) {
    setTimeout(()=>{
      const ctx=document.getElementById('pieCanvas')?.getContext('2d');
      if (!ctx) return;
      if (pieChart){pieChart.destroy();pieChart=null;}
      Chart.register(ChartDataLabels);
      pieChart=new Chart(ctx,{
        type:'doughnut',
        data:{
          labels:stockData.map(d=>d.sym),
          datasets:[{data:stockData.map(d=>parseFloat(d.val.toFixed(2))),backgroundColor:stockData.map((_,i)=>COLORS[i%COLORS.length]),borderColor:'#090b14',borderWidth:3}]
        },
        options:{
          responsive:true,cutout:'48%',layout:{padding:24},
          plugins:{
            legend:{display:false},
            tooltip:{callbacks:{label(c){const t=c.dataset.data.reduce((s,v)=>s+v,0);return ` ${c.label}: $${c.parsed.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})} (${(c.parsed/t*100).toFixed(1)}%)`}}},
            datalabels:{
              color:'#fff',textShadowColor:'rgba(0,0,0,.6)',textShadowBlur:4,anchor:'center',align:'center',
              font:(ctx)=>{const t=ctx.dataset.data.reduce((s,v)=>s+v,0);const p=ctx.dataset.data[ctx.dataIndex]/t*100;return{weight:'700',size:p>=10?12:10}},
              formatter:(value,ctx)=>{const t=ctx.dataset.data.reduce((s,v)=>s+v,0);const p=value/t*100;if(p<4)return '';return ctx.chart.data.labels[ctx.dataIndex]+'\n'+p.toFixed(1)+'%'}
            }
          }
        }
      });
    },50);
  }
}

// ════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════
renderProfileList();
</script>
</body>
</html>
