<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Portfolio by Dam</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<style>
:root {
  --bg:#090b14; --card:#13151f; --card2:#191c2b; --card3:#1f2233;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
  --text:#eef0ff; --muted:#8891b8; --sub:#4f566b;
  --green:#10b981; --red:#ef4444; --yellow:#f59e0b; --accent:#6366f1;
  --accent-color:#6366f1;
  --safe-top:env(safe-area-inset-top,0px); --safe-bottom:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* ── Screens ── */
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}

/* ══════════════════════════════
   LOGIN SCREEN
══════════════════════════════ */
.login-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:calc(var(--safe-top) + 48px) 28px calc(var(--safe-bottom) + 40px)}
.login-logo{font-size:42px;margin-bottom:10px;cursor:pointer;user-select:none}
.login-title{font-size:24px;font-weight:900;letter-spacing:-0.5px;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:52px}
.profiles{display:flex;flex-direction:column;gap:13px;width:100%;max-width:340px}

.profile-btn{
  background:var(--card);border:1.5px solid var(--border);border-radius:18px;
  padding:16px 18px;display:flex;align-items:center;gap:15px;cursor:pointer;
  transition:all .2s;text-align:left
}
.profile-btn:active{transform:scale(0.97);background:var(--card2)}
.profile-avatar{width:52px;height:52px;border-radius:15px;display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0}
.profile-name{font-size:17px;font-weight:800;margin-bottom:2px}
.profile-desc{font-size:12px;color:var(--muted)}
.profile-arrow{margin-left:auto;color:var(--sub);font-size:20px;font-weight:300}

/* ══════════════════════════════
   PIN SCREEN
══════════════════════════════ */
.pin-wrap{flex:1;display:flex;flex-direction:column;align-items:center;padding:calc(var(--safe-top) + 16px) 24px calc(var(--safe-bottom) + 16px)}
.pin-back{align-self:flex-start;background:transparent;border:none;color:var(--muted);font-size:14px;padding:8px 0 24px;cursor:pointer;display:flex;align-items:center;gap:5px}
.pin-avatar{width:70px;height:70px;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:14px}
.pin-name{font-size:24px;font-weight:900;margin-bottom:6px}
.pin-hint{font-size:13px;color:var(--muted);margin-bottom:36px}
.pin-dots{display:flex;gap:18px;margin-bottom:44px}
.pin-dot{width:15px;height:15px;border-radius:50%;border:2px solid var(--sub);background:transparent;transition:all .15s}
.pin-dot.filled{background:var(--accent-color);border-color:var(--accent-color);transform:scale(1.15)}
.pin-dot.error{border-color:var(--red)!important;background:var(--red)!important;animation:shake .35s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}

.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:300px}
.num-btn{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;font-size:23px;font-weight:600;cursor:pointer;transition:all .1s;color:var(--text);display:flex;align-items:center;justify-content:center;line-height:1}
.num-btn:active{background:var(--card3);transform:scale(0.92)}
.num-del{font-size:17px;color:var(--muted)}
.num-empty{background:transparent;border-color:transparent;pointer-events:none}

/* ══════════════════════════════
   DASHBOARD SCREEN
══════════════════════════════ */
.dash-header{
  padding:calc(var(--safe-top) + 14px) 16px 14px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:50;
  background:rgba(9,11,20,0.93);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)
}
.dash-header-left{display:flex;align-items:center;gap:10px}
.dash-avatar{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px}
.dash-name{font-size:16px;font-weight:800}
.btn-logout{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:20px;padding:6px 13px;font-size:12px;cursor:pointer}
.dash-body{padding:20px 16px calc(48px + var(--safe-bottom))}

/* ── Hero (value only, centered) ── */
.hero-wrap{display:flex;justify-content:center;margin-bottom:28px}
.hero{
  background:linear-gradient(145deg,var(--card) 0%,var(--card2) 100%);
  border:1.5px solid; border-radius:24px;
  padding:32px 40px; text-align:center;
  position:relative; overflow:hidden; min-width:280px
}
.hero-glow{position:absolute;top:-50px;left:50%;transform:translateX(-50%);width:200px;height:200px;border-radius:50%;opacity:0.10;pointer-events:none}
.hero-lbl{font-size:11px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:rgba(255,255,255,0.45);margin-bottom:10px}
.hero-val{font-size:44px;font-weight:900;letter-spacing:-2px;line-height:1;margin-bottom:6px}
.hero-thb{font-size:14px;color:rgba(255,255,255,0.45)}

/* ── Section ── */
.sec{margin-bottom:28px}
.sec-hdr{font-size:10px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding-left:2px}

/* ── Holdings table ── */
.h-tbl{width:100%;border-collapse:collapse}
.h-tbl th{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--sub);padding:0 10px 10px;text-align:right}
.h-tbl th:first-child{text-align:left}
.h-tbl td{padding:10px;border-top:1px solid var(--border);font-size:13px;text-align:right;vertical-align:middle}
.h-tbl td:first-child{text-align:left}
.h-tbl tr:last-child td{border-bottom:1px solid var(--border)}
.h-sym{font-size:14px;font-weight:800}
.h-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:8px;vertical-align:middle;flex-shrink:0}

/* ── Pie chart ── */
.pie-wrap{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:20px;margin-bottom:24px}
.pie-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);text-align:center;margin-bottom:16px}
.pie-canvas-wrap{max-width:320px;margin:0 auto}

/* ── Struct rows (acc/dec/options) ── */
.s-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px 15px;margin-bottom:9px;display:flex;align-items:center;justify-content:space-between}
.s-title{font-size:14px;font-weight:700}
.s-sub{font-size:11px;color:var(--muted);margin-top:2px}
.s-tag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:7px;display:inline-block}

/* ── Footer ── */
.dash-foot{text-align:center;padding:12px 0 4px;font-size:11px;color:var(--sub)}

/* Loading */
.loading{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--muted);font-size:14px;padding:40px}
.spin{animation:spin .8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ══════════════════════════════
   SETUP SCREEN
══════════════════════════════ */
.setup-wrap{flex:1;padding:calc(var(--safe-top) + 20px) 20px calc(var(--safe-bottom) + 24px);max-width:480px;margin:0 auto;width:100%;overflow-y:auto}
.setup-title{font-size:22px;font-weight:900;margin-bottom:4px}
.setup-sub{font-size:13px;color:var(--muted);margin-bottom:28px;line-height:1.5}
.form-lbl{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.6px;text-transform:uppercase;margin-bottom:6px;margin-top:18px}
.form-inp{width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 13px;color:var(--text);font-size:14px;outline:none;transition:.2s}
.form-inp:focus{border-color:var(--accent)}
.pin-row{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:13px 15px;margin-bottom:9px;display:flex;align-items:center;gap:13px}
.pin-row-avatar{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.pin-row-name{font-size:15px;font-weight:700;flex:1}
.pin-row-lbl{font-size:12px;color:var(--muted)}
.pin-inp{width:78px;background:var(--card2);border:1px solid var(--border);border-radius:9px;padding:8px;color:var(--text);font-size:16px;text-align:center;outline:none;letter-spacing:4px}
.btn-save{background:var(--accent);border:none;color:#fff;border-radius:13px;padding:15px;font-size:15px;font-weight:700;cursor:pointer;width:100%;margin-top:24px}
.btn-save:active{opacity:.8}
.btn-cancel{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:13px;padding:13px;font-size:14px;cursor:pointer;width:100%;margin-top:10px}
</style>
</head>
<body>

<!-- ══════════ LOGIN ══════════ -->
<div class="screen active" id="screenLogin">
  <div class="login-wrap">
    <div class="login-logo" id="setupTrigger" title="">📊</div>
    <div class="login-title">Portfolio</div>
    <div class="login-sub">by Dam · เลือกบัญชีของคุณ</div>
    <div class="profiles" id="profileList"></div>
  </div>
</div>

<!-- ══════════ PIN ══════════ -->
<div class="screen" id="screenPin">
  <div class="pin-wrap">
    <button class="pin-back" onclick="showLogin()">← กลับ</button>
    <div class="pin-avatar" id="pinAvatar"></div>
    <div class="pin-name" id="pinName"></div>
    <div class="pin-hint">ใส่รหัส PIN 4 หลัก</div>
    <div class="pin-dots">
      <div class="pin-dot" id="pd0"></div>
      <div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div>
      <div class="pin-dot" id="pd3"></div>
    </div>
    <div class="numpad">
      <button class="num-btn" onclick="numTap('1')">1</button>
      <button class="num-btn" onclick="numTap('2')">2</button>
      <button class="num-btn" onclick="numTap('3')">3</button>
      <button class="num-btn" onclick="numTap('4')">4</button>
      <button class="num-btn" onclick="numTap('5')">5</button>
      <button class="num-btn" onclick="numTap('6')">6</button>
      <button class="num-btn" onclick="numTap('7')">7</button>
      <button class="num-btn" onclick="numTap('8')">8</button>
      <button class="num-btn" onclick="numTap('9')">9</button>
      <button class="num-btn num-empty"></button>
      <button class="num-btn" onclick="numTap('0')">0</button>
      <button class="num-btn num-del" onclick="numDel()">⌫</button>
    </div>
  </div>
</div>

<!-- ══════════ DASHBOARD ══════════ -->
<div class="screen" id="screenDash">
  <div class="dash-header">
    <div class="dash-header-left">
      <div class="dash-avatar" id="dashAvatar"></div>
      <div class="dash-name" id="dashName"></div>
    </div>
    <button class="btn-logout" onclick="showLogin()">ออก</button>
  </div>
  <div class="dash-body" id="dashBody">
    <div class="loading"><span class="spin" style="font-size:24px">↻</span>กำลังโหลด…</div>
  </div>
</div>

<!-- ══════════ SETUP ══════════ -->
<div class="screen" id="screenSetup">
  <div class="setup-wrap">
    <div class="setup-title">⚙️ ตั้งค่า</div>
    <div class="setup-sub">วาง Sync Code จากหน้า Settings ของ Portfolio Dashboard และตั้ง PIN แต่ละคน</div>

    <div class="form-lbl">Sync Code</div>
    <input class="form-inp" id="setupCode" type="password" placeholder="วาง Sync Code ที่นี่…" autocomplete="off">
    <div style="font-size:11px;color:var(--sub);margin-top:5px">คัดลอกจาก Settings → Cloud Sync → Sync Code</div>

    <div class="form-lbl" style="margin-top:22px">PIN แต่ละคน (4 หลัก)</div>
    <div id="pinSetupRows"></div>

    <button class="btn-save" onclick="saveSetup()">💾 บันทึก</button>
    <button class="btn-cancel" onclick="showLogin()">ยกเลิก</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  PROFILES — แก้ portKey ให้ตรงกับ extKey ใน portfolio_dashboard
// ═══════════════════════════════════════════
const PROFILES = [
  { id:'dew',  name:'Dew',  emoji:'🌿', color:'#10b981', bg:'rgba(16,185,129,0.15)',  portKey:'dew',  pin:'1111' },
  { id:'dike', name:'Dike', emoji:'🏦', color:'#3b82f6', bg:'rgba(59,130,246,0.15)',  portKey:'dike', pin:'2222' },
  { id:'big',  name:'Big',  emoji:'💼', color:'#f59e0b', bg:'rgba(245,158,11,0.15)',  portKey:'big',  pin:'3333' },
];

// ═══════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════
let me        = null;   // current profile object
let pinBuf    = '';
let tapCount  = 0;
let tapTimer  = null;

// ═══════════════════════════════════════════
//  STORAGE
// ═══════════════════════════════════════════
const ls = {
  get:     (k,d='')  => { try{return localStorage.getItem(k)||d}catch{return d} },
  set:     (k,v)     => { try{localStorage.setItem(k,v)}catch{} },
  getObj:  (k,d={})  => { try{return JSON.parse(localStorage.getItem(k))||d}catch{return d} },
  setObj:  (k,v)     => { try{localStorage.setItem(k,JSON.stringify(v))}catch{} },
};
const getSyncCode = () => ls.get('cl_sync');
const getPins     = () => ls.getObj('cl_pins');
const getPin      = id => { const p=getPins(); return p[id] || PROFILES.find(x=>x.id===id)?.pin || '0000'; };

function parseSyncCode(code) {
  try {
    const dec = decodeURIComponent(escape(atob(code.trim())));
    const i   = dec.indexOf('|||');
    if (i < 0) return null;
    return { key: dec.slice(0, i), id: dec.slice(i + 3) };
  } catch { return null; }
}

// ═══════════════════════════════════════════
//  SCREENS
// ═══════════════════════════════════════════
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showLogin() { me = null; pinBuf = ''; show('screenLogin'); }

// ═══════════════════════════════════════════
//  SETUP (tap logo 5x)
// ═══════════════════════════════════════════
document.getElementById('setupTrigger').addEventListener('click', () => {
  tapCount++;
  clearTimeout(tapTimer);
  tapTimer = setTimeout(() => tapCount = 0, 2500);
  if (tapCount >= 5) { tapCount = 0; openSetup(); }
});

function openSetup() {
  const code = getSyncCode();
  if (code) document.getElementById('setupCode').value = code;
  const pins = getPins();
  document.getElementById('pinSetupRows').innerHTML = PROFILES.map(p => `
    <div class="pin-row">
      <div class="pin-row-avatar" style="background:${p.bg}">${p.emoji}</div>
      <div class="pin-row-name">${p.name}</div>
      <div class="pin-row-lbl" style="margin-right:6px">PIN</div>
      <input class="pin-inp" id="pinInp_${p.id}" type="number" maxlength="4"
        placeholder="${p.pin}" value="${pins[p.id]||''}" oninput="if(this.value.length>4)this.value=this.value.slice(0,4)">
    </div>
  `).join('');
  show('screenSetup');
}

function saveSetup() {
  const code = document.getElementById('setupCode').value.trim();
  if (code) { if (!parseSyncCode(code)) { alert('Sync Code ไม่ถูกต้อง ลองใหม่นะครับ'); return; } ls.set('cl_sync', code); }
  const pins = {};
  PROFILES.forEach(p => { const v=(document.getElementById('pinInp_'+p.id)?.value||'').trim(); if(v.length===4) pins[p.id]=v; });
  ls.setObj('cl_pins', pins);
  alert('✓ บันทึกแล้ว');
  showLogin();
}

// ═══════════════════════════════════════════
//  PROFILE SELECT → PIN SCREEN
// ═══════════════════════════════════════════
function renderProfileList() {
  document.getElementById('profileList').innerHTML = PROFILES.map(p => `
    <div class="profile-btn" onclick="selectProfile('${p.id}')" style="border-color:${p.color}33">
      <div class="profile-avatar" style="background:${p.bg}">${p.emoji}</div>
      <div>
        <div class="profile-name" style="color:${p.color}">${p.name}</div>
        <div class="profile-desc">ดูพอร์ตของฉัน</div>
      </div>
      <div class="profile-arrow">›</div>
    </div>
  `).join('');
}

function selectProfile(id) {
  me = PROFILES.find(p => p.id === id);
  if (!me) return;
  pinBuf = '';
  document.documentElement.style.setProperty('--accent-color', me.color);
  const av = document.getElementById('pinAvatar');
  av.textContent = me.emoji; av.style.background = me.bg;
  document.getElementById('pinName').textContent = me.name;
  document.getElementById('pinName').style.color  = me.color;
  updateDots();
  show('screenPin');
}

// ═══════════════════════════════════════════
//  PIN NUMPAD
// ═══════════════════════════════════════════
function numTap(d) {
  if (pinBuf.length >= 4) return;
  pinBuf += d; updateDots();
  if (pinBuf.length === 4) setTimeout(checkPin, 130);
}
function numDel() { pinBuf = pinBuf.slice(0, -1); updateDots(); }
function updateDots() {
  for (let i=0; i<4; i++) {
    const el = document.getElementById('pd'+i);
    el.classList.toggle('filled', i < pinBuf.length);
    el.classList.remove('error');
  }
}
function checkPin() {
  if (pinBuf === getPin(me.id)) {
    openDashboard();
  } else {
    for (let i=0; i<4; i++) document.getElementById('pd'+i).classList.add('error');
    setTimeout(() => { pinBuf=''; updateDots(); }, 650);
  }
}

// ═══════════════════════════════════════════
//  DASHBOARD
// ═══════════════════════════════════════════
function openDashboard() {
  const av = document.getElementById('dashAvatar');
  av.textContent = me.emoji; av.style.background = me.bg;
  document.getElementById('dashName').textContent = me.name;
  document.getElementById('dashName').style.color  = me.color;
  document.getElementById('dashBody').innerHTML = '<div class="loading"><span class="spin" style="font-size:24px">↻</span>กำลังโหลดข้อมูล…</div>';
  show('screenDash');
  loadData();
}

async function fetchLiveFX() {
  try {
    const r = await fetch('https://open.er-api.com/v6/latest/USD', { signal: AbortSignal.timeout(5000) });
    if (r.ok) {
      const d = await r.json();
      if (d.result === 'success' && d.rates?.THB) return d.rates.THB;
    }
  } catch {}
  return null;
}

async function loadData() {
  const code = getSyncCode();
  if (!code) {
    document.getElementById('dashBody').innerHTML =
      '<div class="loading">⚙️ ยังไม่ได้ตั้งค่า<br><span style="font-size:12px;color:var(--sub);margin-top:8px;display:block">แตะไอคอน 📊 ที่หน้าหลัก 5 ครั้ง</span></div>';
    return;
  }
  const cfg = parseSyncCode(code);
  if (!cfg) {
    document.getElementById('dashBody').innerHTML = '<div class="loading">❌ Sync Code ไม่ถูกต้อง</div>';
    return;
  }
  try {
    // ดึง JSONBin + FX rate พร้อมกัน
    const [dataRes, liveFX] = await Promise.all([
      fetch(`https://api.jsonbin.io/v3/b/${cfg.id}/latest`, {
        headers: { 'X-Master-Key': cfg.key, 'X-Bin-Meta': 'false' }
      }),
      fetchLiveFX()
    ]);
    if (!dataRes.ok) throw new Error('HTTP ' + dataRes.status);
    const S = await dataRes.json();
    // ใช้ live FX ก่อน → ถ้าไม่ได้ค่อยใช้จาก S → fallback 35
    if (liveFX) S._liveFX = liveFX;
    renderDash(S);
  } catch(e) {
    document.getElementById('dashBody').innerHTML =
      '<div class="loading">❌ โหลดข้อมูลไม่ได้<br><span style="font-size:12px;color:var(--sub);margin-top:8px;display:block">ตรวจสอบ Internet และ Sync Code</span></div>';
  }
}

// ═══════════════════════════════════════════
//  RENDER DASHBOARD
// ═══════════════════════════════════════════
const STOCK_COLORS = [
  '#7c3aed','#3b82f6','#10b981','#f59e0b','#ef4444',
  '#0ea5e9','#8b5cf6','#ea580c','#06b6d4','#84cc16',
  '#ec4899','#14b8a6','#f97316','#6366f1','#a3e635',
];

let pieChart = null;

function renderDash(S) {
  if (!S?.portfolios) {
    document.getElementById('dashBody').innerHTML = '<div class="loading">ข้อมูลไม่ถูกต้อง</div>';
    return;
  }

  const port = S.portfolios.find(p =>
    (p.extKey||'').toLowerCase() === me.portKey ||
    (p.name||'').toLowerCase().includes(me.portKey)
  );
  if (!port) {
    document.getElementById('dashBody').innerHTML =
      `<div class="loading">ไม่พบพอร์ตของ ${me.name}<br><span style="font-size:12px;color:var(--sub);margin-top:8px;display:block">portKey: "${me.portKey}"</span></div>`;
    return;
  }

  const all     = (S.holdings||[]).filter(h => h.portfolioId === port.id);
  const stocks  = all.filter(h => !['option','accumulator','decumulator','fcn','cash','money_market','other'].includes(h.type));
  const cash    = all.filter(h => h.type==='cash'||h.type==='money_market');
  const accdec  = all.filter(h => h.type==='accumulator'||h.type==='decumulator');
  const options = all.filter(h => h.type==='option');

  // Priority: live fetch → lastFxRates จาก main dashboard → fallback 35
  const fxUSD = parseFloat(S._liveFX) || parseFloat(S.lastFxRates?.USD) || parseFloat(S.fxRates?.USD) || 35;
  const fxSrc = S._liveFX ? 'live' : (S.lastFxRates?.USD ? 'cached' : 'fallback');
  const toUSD = (val, cur) => {
    if (!val) return 0;
    cur = (cur && cur !== 'AUTO') ? cur : 'USD';
    if (cur === 'USD') return val;
    if (cur === 'THB') return val / fxUSD;
    return val / fxUSD;
  };

  // Compute values
  let totalUSD = 0;
  const stockData = stocks.map(h => {
    const cur   = (h.currency&&h.currency!=='AUTO')?h.currency:'USD';
    const price = parseFloat(h.currentPrice||h.price)||0;
    const qty   = parseFloat(h.qty)||0;
    const val   = toUSD(price*qty, cur);
    totalUSD   += val;
    return { h, price, qty, val, cur, sym: h.resolvedSymbol||h.symbol||'?' };
  });
  cash.forEach(h => {
    const cur = (h.currency&&h.currency!=='AUTO')?h.currency:'USD';
    totalUSD += toUSD(parseFloat(h.currentPrice||h.price)||0, cur);
  });

  // Sort by value desc
  stockData.sort((a,b) => b.val - a.val);

  const f2  = n => n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  const f0  = n => Math.round(n).toLocaleString('en-US');
  const fUSD = n => '$'+f2(n);

  let html = '';

  // ── Hero (centered, value only) ──
  html += `
    <div class="hero-wrap">
      <div class="hero" style="border-color:${me.color}44">
        <div class="hero-glow" style="background:${me.color}"></div>
        <div class="hero-lbl">Portfolio Value</div>
        <div class="hero-val" style="color:${me.color}">฿${f0(totalUSD * fxUSD)}</div>
        <div class="hero-thb">${fUSD(totalUSD)}</div>
      </div>
    </div>
    <div style="text-align:center;margin-top:-12px;margin-bottom:20px">
      <span style="display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:5px 13px;font-size:12px;color:var(--muted)">
        <span style="font-size:10px;opacity:0.6">FX</span>
        <span style="font-weight:700;color:var(--text)">$1 = ฿${fxUSD.toFixed(2)}</span>
        <span style="font-size:10px;opacity:0.5">${fxSrc}</span>
      </span>
    </div>`;

  // ── Holdings table ──
  if (stockData.length) {
    html += `
      <div class="sec">
        <div class="sec-hdr">💼 หุ้น</div>
        <table class="h-tbl">
          <thead><tr>
            <th>Symbol</th>
            <th>จำนวน</th>
            <th>ราคา</th>
            <th>มูลค่า</th>
          </tr></thead>
          <tbody>`;
    stockData.forEach(({ h, price, qty, val, sym }, i) => {
      const col = STOCK_COLORS[i % STOCK_COLORS.length];
      html += `<tr>
        <td><span class="h-dot" style="background:${col}"></span><span class="h-sym" style="color:${col}">${sym}</span></td>
        <td style="color:var(--muted)">${qty.toLocaleString('en',{maximumFractionDigits:3})}</td>
        <td style="color:var(--muted)">$${f2(price)}</td>
        <td style="font-weight:700">${fUSD(val)}</td>
      </tr>`;
    });
    html += `</tbody></table>
      </div>`;
  }

  // ── Cash (เหนือ pie chart) ──
  if (cash.length) {
    html += `<div class="sec"><div class="sec-hdr">💵 เงินสด</div>`;
    cash.forEach(h => {
      const cur = (h.currency&&h.currency!=='AUTO')?h.currency:'USD';
      const val = parseFloat(h.currentPrice||h.price)||0;
      const disp = cur==='USD'?fUSD(val):`฿${f0(val)}`;
      html += `<div class="s-card"><div><div class="s-title">เงินสด (${cur})</div></div><div style="font-size:15px;font-weight:800">${disp}</div></div>`;
    });
    html += `</div>`;
  }

  // ── Pie chart ──
  if (stockData.length > 1) {
    html += `
      <div class="pie-wrap">
        <div class="pie-title">Allocation</div>
        <div class="pie-canvas-wrap"><canvas id="pieCanvas"></canvas></div>
      </div>`;
  }

  // ── Acc/Dec ──
  if (accdec.length) {
    html += `<div class="sec"><div class="sec-hdr">🔄 Accumulator / Decumulator</div>`;
    accdec.forEach(h => {
      const isAcc = h.type==='accumulator';
      const col   = isAcc ? '#10b981' : '#f59e0b';
      const tag   = isAcc ? 'ACC' : 'DEC';
      const sym   = h.optionUnderlying||(h.symbol||'').split(' ')[0]||'?';
      const strike = parseFloat(h.strike)||0;
      const ko     = parseFloat(h.koLevel)||0;
      const qty    = parseFloat(h.periodQty)||0;
      html += `<div class="s-card">
        <div>
          <div class="s-title">${sym} <span class="s-tag" style="background:${col}20;color:${col}">${tag}</span></div>
          <div class="s-sub">${qty.toLocaleString()}/วัน · Strike $${f2(strike)}${ko?` · KO $${f2(ko)}`:''}${h.expiry?` · หมด ${h.expiry}`:''}</div>
        </div>
        <div class="s-tag" style="background:rgba(16,185,129,0.1);color:var(--green)">Active</div>
      </div>`;
    });
    html += `</div>`;
  }

  // ── Options ──
  if (options.length) {
    html += `<div class="sec"><div class="sec-hdr">📋 Options</div>`;
    options.forEach(h => {
      const isSell = (h.side||'sell')==='sell';
      const col    = isSell?'#ef4444':'#10b981';
      const tag    = (isSell?'SELL ':'BUY ')+(h.optionType||'').toUpperCase();
      const sym    = h.optionUnderlying||h.symbol||'?';
      html += `<div class="s-card">
        <div>
          <div class="s-title">${sym} <span class="s-tag" style="background:${col}20;color:${col}">${tag}</span></div>
          <div class="s-sub">Strike $${f2(parseFloat(h.strike)||0)} · หมด ${h.expiry||'—'} · ${h.contracts||1} contracts</div>
        </div>
      </div>`;
    });
    html += `</div>`;
  }

  if (!stockData.length && !cash.length)
    html += `<div class="loading" style="padding-top:60px">📭 ยังไม่มีข้อมูลในพอร์ต</div>`;

  html += `<div class="dash-foot">ข้อมูลจาก Portfolio Dashboard · อัปเดตเมื่อ Dam กดรีเฟรชราคา</div>`;

  document.getElementById('dashBody').innerHTML = html;

  // ── Draw pie chart after DOM update ──
  if (stockData.length > 1) {
    setTimeout(() => {
      const ctx = document.getElementById('pieCanvas')?.getContext('2d');
      if (!ctx) return;
      if (pieChart) { pieChart.destroy(); pieChart = null; }
      const labels = stockData.map(d => d.sym);
      const data   = stockData.map(d => parseFloat(d.val.toFixed(2)));
      const colors = stockData.map((_, i) => STOCK_COLORS[i % STOCK_COLORS.length]);
      Chart.register(ChartDataLabels);
      pieChart = new Chart(ctx, {
        type: 'doughnut',
        data: { labels, datasets: [{ data, backgroundColor: colors, borderColor: '#090b14', borderWidth: 3 }] },
        options: {
          responsive: true,
          cutout: '48%',
          layout: { padding: 24 },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label(c) {
                  const total = c.dataset.data.reduce((s,v)=>s+v,0);
                  return ` ${c.label}: $${c.parsed.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2})} (${(c.parsed/total*100).toFixed(1)}%)`;
                }
              }
            },
            datalabels: {
              color: '#fff',
              textShadowColor: 'rgba(0,0,0,0.6)',
              textShadowBlur: 4,
              font: (ctx) => {
                const total = ctx.dataset.data.reduce((s,v)=>s+v,0);
                const pct   = ctx.dataset.data[ctx.dataIndex] / total * 100;
                return { weight: '700', size: pct >= 10 ? 12 : 10 };
              },
              anchor: 'center',
              align: 'center',
              formatter: (value, ctx) => {
                const total = ctx.dataset.data.reduce((s,v)=>s+v,0);
                const pct   = (value / total * 100);
                if (pct < 4) return '';  // ซ่อนถ้าเล็กเกินไป
                return ctx.chart.data.labels[ctx.dataIndex] + '\n' + pct.toFixed(1) + '%';
              },
              display: true,
            }
          }
        }
      });
    }, 50);
  }
}

// ═══════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════
renderProfileList();
</script>
</body>
</html>
